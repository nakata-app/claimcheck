name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Checkout adaptmem (sibling)
        uses: actions/checkout@v4
        with:
          repository: nakata-app/adaptmem
          path: _siblings/adaptmem
      - name: Checkout halluguard (sibling)
        uses: actions/checkout@v4
        with:
          repository: nakata-app/halluguard
          path: _siblings/halluguard
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install siblings (editable) + claimcheck
        run: |
          python -m pip install --upgrade pip
          pip install -e ./_siblings/adaptmem
          pip install -e ./_siblings/halluguard
          pip install -e ".[dev]"
          pip install mypy
      - name: Lint
        run: ruff check claimcheck tests
      - name: Type-check (mypy --strict)
        run: mypy --strict claimcheck
      - name: Test
        run: pytest -q
